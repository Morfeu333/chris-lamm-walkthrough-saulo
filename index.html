let current = 0;
let playing = true;
let timer = null;

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}

function render() {
  const seg = segments[current];
  document.getElementById('mainFrame').src = seg.frame;
  document.getElementById('segCounter').textContent = `${current + 1} / ${segments.length}`;
  document.getElementById('timeDisplay').textContent = `${formatTime(seg.start_ms)} / 13:38`;

  const pct = (seg.start_ms / 818000) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  document.querySelectorAll('.segment').forEach((el, i) => {
    el.classList.toggle('active', i === current);
    el.classList.toggle('past', i < current);
  });

  const activeEl = document.querySelector('.segment.active');
  if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function buildTranscript() {
  const body = document.getElementById('transcriptBody');
  body.innerHTML = segments.map((s, i) => `
    <div class="segment" onclick="jumpTo(${i})">
      <div class="seg-time">${formatTime(s.start_ms)}</div>
      <div class="seg-text">${s.text}</div>
    </div>
  `).join('');
}

function jumpTo(i) {
  current = i;
  render();
  if (playing) scheduleNext();
}

function prevSeg() { if (current > 0) { current--; render(); if (playing) scheduleNext(); } }
function nextSeg() { if (current < segments.length - 1) { current++; render(); if (playing) scheduleNext(); } else { playing = false; updatePlayBtn(); } }

function togglePlay() {
  playing = !playing;
  updatePlayBtn();
  if (playing) scheduleNext(); else clearTimeout(timer);
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '⏸ Pausar' : '▶ Play';
  btn.classList.toggle('active', playing);
}

function scheduleNext() {
  clearTimeout(timer);
  if (!playing || current >= segments.length - 1) return;
  const dur = segments[current + 1].start_ms - segments[current].start_ms;
  timer = setTimeout(() => { current++; render(); scheduleNext(); }, Math.max(dur, 500));
}

function seekFromBar(e) {
  const bar = document.getElementById('progressBar');
  const pct = e.offsetX / bar.offsetWidth;
  const targetMs = pct * 818000;
  let closest = 0;
  segments.forEach((s, i) => { if (Math.abs(s.start_ms - targetMs) < Math.abs(segments[closest].start_ms - targetMs)) closest = i; });
  jumpTo(closest);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSeg();
  else if (e.key === 'ArrowLeft') prevSeg();
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

buildTranscript();
render();
scheduleNext();
</script>
